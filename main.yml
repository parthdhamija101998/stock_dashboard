name: Update Stock Analysis

on:
  schedule:
    # This runs every 6 hours. Adjust via crontab.guru if needed.
    - cron: '0 */6 * * *'
  workflow_dispatch: # This allows you to run it manually with a button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Analysis
        run: |
          python stock_analyzer.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_analysis_results.html
          git commit -m "Automated Stock Update: $(date)" || exit 0
          git push
