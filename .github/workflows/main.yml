name: Update Stock Analysis

on:
  schedule:
    - cron: '0 */6 * * *' # Updates every 6 hours
  workflow_dispatch: # Allows manual refresh via the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up future runs by reusing cached dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # --prefer-binary avoids long compile times for pandas/matplotlib
          pip install --prefer-binary -r requirements.txt
          pip install Jinja2 matplotlib 

      - name: Run Analysis
        run: |
          python stock_analyzer.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Ensure this matches the filename inside your stock_analyzer.py
          git add index.html 
          git commit -m "Update Styled Stock Results: $(date)" || exit 0
          git push
