<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Dynamic Stock Dashboard</title>
</head>
<body>

    <div class="dashboard-container">
        <h1>Stock Dashboard</h1>

        <div class="controls">
            <input type="text" id="search-bar" placeholder="Search for a stock..." aria-label="Stock Search">
            <button id="add-ticker-button">Add Ticker</button>
        </div>

        <table id="stock-table">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Price</th>
                    <th>Change</th>
                    <th>Signal</th>
                    <th>Sector</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic rows will be added here -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
